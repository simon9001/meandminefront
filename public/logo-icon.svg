<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 148" fill="none">

  <!-- ══ HOUSE ICON (standalone mark) ══════════════════════════════════════ -->

  <!-- Chimney -->
  <rect x="94" y="8" width="15" height="34" rx="2" fill="#1a3828"/>
  <!-- Chimney cap -->
  <rect x="91" y="6" width="21" height="6" rx="2" fill="#c47b2a"/>

  <!-- Roof -->
  <polygon points="70,12 142,68 0,68" fill="#1a3828"/>
