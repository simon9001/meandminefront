  <line x1="111" y1="82" x2="111" y2="110" stroke="#1a3828" stroke-width="1.5"/>
  <line x1="95" y1="96" x2="127" y2="96" stroke="#1a3828" stroke-width="1.5"/>

  <!-- Arched door -->
  <path d="M52 142 L52 104 Q70 87 88 104 L88 142 Z" fill="#f5ede0"/>
  <!-- Door knob -->
  <circle cx="57" cy="125" r="2.8" fill="#c47b2a"/>

